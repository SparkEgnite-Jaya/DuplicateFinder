<template>
    <lightning-card title="Duplicate Records">
        <div class="container">
            <template for:each={duplicateRecords} for:item="record">

                <div key={record.recordId}
                     class="card slds-card slds-p-around_medium slds-m-around_small">
                     <div class="slds-grid slds-wrap">

                        <div class="slds-col slds-size_1-of-1">
                            <h2 class="title">
                                {record.recordName}
                            </h2>

                            <div class="meta">
                                <span>
                                    Record Id : {record.recordId}
                                </span>
                            </div>
                        </div>

                        <div class="slds-col slds-size_1-of-1 slds-m-top_small">

                            <p class="slds-text-title_bold">
                                Matched Fields
                            </p>

                            <template for:each={record.matchedFields}
                                      for:item="field">

                                <div key={field.fieldName}
                                     class="slds-p-vertical_x-small">

                                    <strong>{field.fieldName}</strong>
                                    :
                                    {field.fieldValue}

                                </div>

                            </template>

                        </div>

                        <div class="slds-col slds-size_1-of-1 slds-m-top_medium">

                            <lightning-button
                                variant="brand"
                                label="View Record"
                                data-id={record.recordId}
                                onclick={handleViewRecord}>
                            </lightning-button>

                        </div>

                    </div>

                </div>

            </template>
        </div>

    </lightning-card>
</template>
