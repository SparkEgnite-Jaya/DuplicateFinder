name: Validate PR to Main

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Salesforce CLI
        run: npm install @salesforce/cli --global

      - name: Authenticate Packaging Org
        run: |
          echo "${{ secrets.PACKAGING_ORG_SECRET }}" > authfile.txt
          sf org login sfdx-url --sfdx-url-file authfile.txt --alias packaging_Org

      - name: Validate Deployment
        run: |
          sf project deploy validate \
            --target-org packaging_Org \
            --source-dir force-app \
            --test-level RunLocalTests \
            --coverage-formatters text \
            --wait 60
